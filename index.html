<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kcal">
<meta name="theme-color" content="#0a0a0f">
<title>Kcal Diary</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0a0f;
  --bg2:#13131d;
  --bg3:#1c1c2a;
  --glass:rgba(255,255,255,0.04);
  --glass2:rgba(255,255,255,0.07);
  --border:rgba(255,255,255,0.07);
  --border2:rgba(255,255,255,0.13);
  --text:#eeeef5;
  --text2:rgba(238,238,245,0.5);
  --text3:rgba(238,238,245,0.28);
  --accent:#7c6aff;
  --accent2:#a855f7;
  --green:#20d4a0;
  --red:#ff5252;
  --orange:#ffaa3d;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
  --fs:'Syne',sans-serif;
  --fb:'DM Sans',sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--fb);overflow:hidden;-webkit-font-smoothing:antialiased}
body{display:flex;flex-direction:column}

/* ORBS */
.orb{position:fixed;border-radius:50%;filter:blur(90px);pointer-events:none;z-index:0;transition:all 1s ease}
.orb1{width:280px;height:280px;background:rgba(124,106,255,0.18);top:-60px;right:-40px}
.orb2{width:220px;height:220px;background:rgba(168,85,247,0.1);bottom:30%;left:-70px}

/* HEADER */
.hdr{
  z-index:10;flex-shrink:0;
  padding:calc(var(--safe-top)+12px) 18px 12px;
  background:rgba(10,10,15,0.88);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-bottom:0.5px solid var(--border);
}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.logo{font-family:var(--fs);font-size:20px;font-weight:800;letter-spacing:-0.5px;background:linear-gradient(120deg,#eeeef5 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hdr-actions{display:flex;gap:8px;align-items:center}
.target-pill{display:flex;align-items:center;gap:5px;background:var(--glass2);border:0.5px solid var(--border2);border-radius:20px;padding:5px 11px}
.target-pill input{width:44px;border:none;background:transparent;color:var(--accent);font-size:13px;font-weight:700;text-align:center;outline:none;font-family:var(--fs)}
.target-pill span{font-size:11px;color:var(--text3)}
.icon-btn{width:34px;height:34px;border-radius:50%;border:0.5px solid var(--border2);background:var(--glass);color:var(--text2);font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.2s}
.icon-btn:active{background:var(--glass2);transform:scale(0.93)}
.save-btn{padding:7px 16px;border-radius:20px;border:none;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:13px;font-weight:600;font-family:var(--fs);cursor:pointer;transition:opacity 0.2s,transform 0.15s;letter-spacing:0.02em}
.save-btn:active{opacity:0.8;transform:scale(0.96)}
.save-btn:disabled{opacity:0.45}

/* DAY NAV */
.day-nav{display:flex;align-items:center;justify-content:space-between}
.nav-btn{width:36px;height:36px;border-radius:50%;border:0.5px solid var(--border2);background:var(--glass);color:var(--text2);font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.18s;flex-shrink:0}
.nav-btn:active{background:var(--glass2);color:var(--text)}
.day-info{text-align:center;flex:1;padding:0 8px}
.day-name-big{font-family:var(--fs);font-size:18px;font-weight:800;letter-spacing:-0.4px}
.day-date-sub{font-size:12px;color:var(--text3);margin-top:2px}

/* KCAL RING AREA */
.kcal-area{
  z-index:10;flex-shrink:0;
  background:rgba(10,10,15,0.88);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-bottom:0.5px solid var(--border);
  padding:14px 18px;
}
.kcal-main{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.kcal-big{font-family:var(--fs);font-size:42px;font-weight:800;letter-spacing:-2px;line-height:1;transition:color 0.3s}
.kcal-big.ok{color:var(--green)}
.kcal-big.over{color:var(--red)}
.kcal-big.warn{color:var(--orange)}
.kcal-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-top:4px}
.kcal-stats{display:flex;flex-direction:column;gap:6px;align-items:flex-end}
.stat-row{display:flex;align-items:center;gap:8px}
.stat-lbl{font-size:11px;color:var(--text3);text-align:right}
.stat-val{font-family:var(--fs);font-size:14px;font-weight:700;min-width:52px;text-align:right}
.stat-val.ok{color:var(--green)}
.stat-val.over{color:var(--red)}
.stat-val.warn{color:var(--orange)}
/* Progress bar */
.prog-track{height:4px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden}
.prog-fill{height:4px;border-radius:2px;background:linear-gradient(90deg,var(--accent),var(--green));transition:width 0.5s cubic-bezier(.4,0,.2,1),background 0.3s}
.prog-fill.over{background:linear-gradient(90deg,var(--orange),var(--red))}
.prog-fill.empty{background:rgba(255,255,255,0.1)}

/* SCROLL */
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 16px calc(var(--safe-bot)+80px);z-index:5;position:relative}
.scroll::-webkit-scrollbar{display:none}

/* MEAL CARD */
.meal-card{
  background:var(--glass);border:0.5px solid var(--border);border-radius:16px;
  margin-bottom:10px;padding:14px 16px;
  transition:border-color 0.3s,background 0.3s;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  animation:slideUp 0.35s ease both;
}
.meal-card:nth-child(1){animation-delay:0.02s}
.meal-card:nth-child(2){animation-delay:0.06s}
.meal-card:nth-child(3){animation-delay:0.10s}
.meal-card:nth-child(4){animation-delay:0.14s}
.meal-card:nth-child(5){animation-delay:0.18s}
.meal-card.has-kcal{border-color:rgba(124,106,255,0.22);background:rgba(124,106,255,0.04)}
@keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

.meal-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.meal-left{display:flex;align-items:center;gap:10px}
.meal-icon{width:30px;height:30px;border-radius:8px;background:var(--glass2);border:0.5px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.meal-name{font-family:var(--fs);font-size:14px;font-weight:700;letter-spacing:-0.2px}
.meal-kcal-pill{
  font-family:var(--fs);font-size:13px;font-weight:700;
  color:var(--accent);background:rgba(124,106,255,0.12);
  border:0.5px solid rgba(124,106,255,0.25);border-radius:12px;
  padding:3px 10px;opacity:0;transition:opacity 0.3s,transform 0.3s;transform:scale(0.85);
}
.meal-kcal-pill.show{opacity:1;transform:scale(1)}

.meal-input-row{display:flex;gap:8px;align-items:flex-start}
.meal-ta{
  flex:1;background:rgba(255,255,255,0.03);border:0.5px solid var(--border);
  border-radius:10px;color:var(--text);font-size:15px;font-family:var(--fb);
  font-weight:300;padding:9px 12px;resize:none;min-height:38px;line-height:1.45;
  outline:none;transition:border-color 0.2s,background 0.2s;-webkit-appearance:none;
}
.meal-ta::placeholder{color:var(--text3);font-style:italic;font-size:14px}
.meal-ta:focus{border-color:rgba(124,106,255,0.45);background:rgba(124,106,255,0.05)}

.calc-btn{
  width:38px;height:38px;flex-shrink:0;border-radius:10px;border:none;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:opacity 0.2s,transform 0.15s;
}
.calc-btn:active{opacity:0.75;transform:scale(0.92)}
.calc-btn:disabled{background:var(--glass2);border:0.5px solid var(--border2)}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;animation:spin 0.7s linear infinite}

.meal-nota{font-size:11px;color:var(--text3);font-style:italic;margin-top:6px;line-height:1.4;min-height:0}

/* BOTTOM BAR */
.bottom-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:20;
  padding:10px 16px calc(var(--safe-bot)+10px);
  background:rgba(10,10,15,0.92);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-top:0.5px solid var(--border);
  display:flex;gap:10px;
}
.bottom-btn{
  flex:1;padding:13px;border-radius:14px;border:0.5px solid var(--border2);
  background:var(--glass);color:var(--text2);font-size:13px;font-weight:500;
  font-family:var(--fb);cursor:pointer;transition:all 0.18s;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.bottom-btn:active{background:var(--glass2);transform:scale(0.97)}
.bottom-btn.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));border-color:transparent;color:#fff;font-weight:600;font-family:var(--fs)}
.bottom-btn.primary:active{opacity:0.85}
.bottom-btn:disabled{opacity:0.4;pointer-events:none}

/* WEEKLY REPORT OVERLAY */
.report{
  position:fixed;inset:0;z-index:100;
  background:var(--bg);
  transform:translateY(100%);transition:transform 0.38s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;overflow:hidden;
}
.report.open{transform:translateY(0)}
.report-hdr{
  padding:calc(var(--safe-top)+14px) 18px 14px;
  background:rgba(10,10,15,0.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:0.5px solid var(--border);flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
}
.report-title{font-family:var(--fs);font-size:18px;font-weight:800;letter-spacing:-0.4px}
.close-btn{width:32px;height:32px;border-radius:50%;border:0.5px solid var(--border2);background:var(--glass);color:var(--text2);font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.report-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 16px calc(var(--safe-bot)+20px)}
.report-scroll::-webkit-scrollbar{display:none}

/* WEEK SUMMARY CARD */
.week-summary{
  background:linear-gradient(135deg,rgba(124,106,255,0.12),rgba(168,85,247,0.08));
  border:0.5px solid rgba(124,106,255,0.25);border-radius:18px;
  padding:18px;margin-bottom:14px;
}
.ws-title{font-family:var(--fs);font-size:13px;font-weight:600;color:var(--text2);margin-bottom:12px;text-transform:uppercase;letter-spacing:0.07em}
.ws-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.ws-item{text-align:center}
.ws-val{font-family:var(--fs);font-size:22px;font-weight:800;letter-spacing:-0.5px}
.ws-val.ok{color:var(--green)}
.ws-val.over{color:var(--red)}
.ws-val.warn{color:var(--orange)}
.ws-lbl{font-size:10px;color:var(--text3);margin-top:3px;text-transform:uppercase;letter-spacing:0.05em}

/* DAY ROW IN REPORT */
.day-row{
  background:var(--glass);border:0.5px solid var(--border);border-radius:14px;
  margin-bottom:8px;padding:14px 16px;
  display:flex;align-items:center;gap:12px;cursor:pointer;
  transition:border-color 0.2s;
}
.day-row:active{background:var(--glass2)}
.day-row.today{border-color:rgba(124,106,255,0.35)}
.day-pill{
  width:42px;height:42px;border-radius:10px;flex-shrink:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:var(--glass2);border:0.5px solid var(--border2);
}
.day-pill.ok{background:rgba(32,212,160,0.12);border-color:rgba(32,212,160,0.3)}
.day-pill.over{background:rgba(255,82,82,0.12);border-color:rgba(255,82,82,0.3)}
.day-pill.partial{background:rgba(124,106,255,0.12);border-color:rgba(124,106,255,0.3)}
.dp-short{font-family:var(--fs);font-size:10px;font-weight:700;color:var(--text3)}
.dp-short.ok{color:var(--green)}
.dp-short.over{color:var(--red)}
.dp-short.partial{color:var(--accent)}
.dp-num{font-family:var(--fs);font-size:15px;font-weight:800;color:var(--text2)}
.day-row-info{flex:1}
.dr-name{font-family:var(--fs);font-size:14px;font-weight:700;letter-spacing:-0.2px}
.dr-meals{font-size:12px;color:var(--text3);margin-top:2px}
.dr-kcal{font-family:var(--fs);font-size:16px;font-weight:800;color:var(--text2)}
.dr-kcal.ok{color:var(--green)}
.dr-kcal.over{color:var(--red)}
.dr-kcal.partial{color:var(--accent)}

/* WEEK NAV IN REPORT */
.week-nav-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.wn-btn{width:34px;height:34px;border-radius:50%;border:0.5px solid var(--border2);background:var(--glass);color:var(--text2);font-size:17px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.wn-info{text-align:center}
.wn-key{font-family:var(--fs);font-size:14px;font-weight:700}
.wn-dates{font-size:11px;color:var(--text3);margin-top:1px}

/* TOAST */
.toast{
  position:fixed;bottom:calc(var(--safe-bot)+80px);left:50%;
  transform:translateX(-50%) translateY(40px);opacity:0;
  background:rgba(28,28,40,0.95);backdrop-filter:blur(20px);
  border:0.5px solid var(--border2);color:var(--text);
  padding:10px 20px;border-radius:22px;font-size:13px;font-weight:500;
  transition:transform 0.35s cubic-bezier(.34,1.56,.64,1),opacity 0.3s;
  z-index:300;white-space:nowrap;pointer-events:none;
}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast.ok{border-color:rgba(32,212,160,0.4);color:var(--green)}
.toast.err{border-color:rgba(255,82,82,0.4);color:var(--red)}

/* LOADER */
.loader{position:fixed;inset:0;background:rgba(10,10,15,0.7);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);display:none;align-items:center;justify-content:center;z-index:400}
.loader.show{display:flex}
.loader-box{background:var(--bg3);border:0.5px solid var(--border2);border-radius:20px;padding:26px 34px;text-align:center}
.loader-ring{width:34px;height:34px;border:2.5px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 10px}
.loader-txt{font-size:13px;color:var(--text2)}
</style>
</head>
<body>

<div class="orb orb1"></div>
<div class="orb orb2"></div>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-top">
    <div class="logo">Kcal Diary</div>
    <div class="hdr-actions">
      <div class="target-pill">
        <span style="font-size:13px">🎯</span>
        <input type="number" id="targetInput" value="1600" min="500" max="6000" oninput="updateDayUI()">
        <span>kcal</span>
      </div>
      <button class="save-btn" id="saveBtn" onclick="saveDay()">Salva</button>
    </div>
  </div>
  <div class="day-nav">
    <button class="nav-btn" onclick="changeDay(-1)">‹</button>
    <div class="day-info">
      <div class="day-name-big" id="dayName">—</div>
      <div class="day-date-sub" id="dayDate">—</div>
    </div>
    <button class="nav-btn" onclick="changeDay(1)">›</button>
  </div>
</div>

<!-- KCAL AREA -->
<div class="kcal-area">
  <div class="kcal-main">
    <div>
      <div class="kcal-big" id="kcalBig">—</div>
      <div class="kcal-label">kcal oggi</div>
    </div>
    <div class="kcal-stats">
      <div class="stat-row">
        <div class="stat-lbl">Obiettivo</div>
        <div class="stat-val" id="statTarget">1.600</div>
      </div>
      <div class="stat-row">
        <div class="stat-lbl">Bilancio</div>
        <div class="stat-val" id="statBal">—</div>
      </div>
      <div class="stat-row">
        <div class="stat-lbl">Pasti</div>
        <div class="stat-val" id="statMeals">0/5</div>
      </div>
    </div>
  </div>
  <div class="prog-track"><div class="prog-fill empty" id="progFill" style="width:0%"></div></div>
</div>

<!-- SCROLL -->
<div class="scroll" id="scroll"></div>

<!-- BOTTOM BAR -->
<div class="bottom-bar">
  <button class="bottom-btn" onclick="calcAllDay()">⚡ Calcola tutto</button>
  <button class="bottom-btn primary" onclick="openReport()">📊 Report settimana</button>
</div>

<!-- WEEKLY REPORT -->
<div class="report" id="report">
  <div class="report-hdr">
    <div class="report-title">Report settimanale</div>
    <button class="close-btn" onclick="closeReport()">×</button>
  </div>
  <div class="report-scroll" id="reportScroll"></div>
</div>

<!-- TOAST & LOADER -->
<div class="toast" id="toast"></div>
<div class="loader" id="loader"><div class="loader-box"><div class="loader-ring"></div><div class="loader-txt" id="loaderTxt">Caricamento...</div></div></div>

<script>
const WORKER = 'https://food-diary-worker.davide-cori93.workers.dev';
const DAYS = ['Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato','Domenica'];
const DAY_SHORT = ['LUN','MAR','MER','GIO','VEN','SAB','DOM'];
const MEAL_ICONS = ['☕','🍎','🍝','🥜','🍽️'];
const MEALS = ['Colazione','Spuntino','Pranzo','Merenda','Cena'];
const PH = ['cappuccino, cornetto, yogurt...','frutta, mandorle, crackers...','pasta, riso, insalata, secondo...','yogurt greco, frutta, barretta...','pollo, pesce, verdure, pane...'];

// Stato
let state = {}; // { "2025-W15": { days: [...] } }
let weekOffset = 0;
let dayIndex = new Date().getDay() === 0 ? 6 : new Date().getDay() - 1; // 0=Lun

function getTarget() { return parseInt(document.getElementById('targetInput').value) || 1600; }

// ─── Week / Day keys ─────────────────────────────
function getWeekKey(off = 0) {
  const d = new Date();
  d.setDate(d.getDate() + off * 7);
  const jan4 = new Date(d.getFullYear(), 0, 4);
  const wn = Math.ceil(((d - jan4) / 86400000 + jan4.getDay() + 1) / 7);
  return `${d.getFullYear()}-W${String(wn).padStart(2,'0')}`;
}
function getWeekDates(off = 0) {
  const d = new Date();
  d.setDate(d.getDate() + off * 7);
  const day = d.getDay() || 7;
  const mon = new Date(d); mon.setDate(d.getDate() - day + 1);
  const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
  const fmt = x => x.toLocaleDateString('it-IT',{day:'numeric',month:'short'});
  return `${fmt(mon)} — ${fmt(sun)}`;
}
function getDayDate(di, off = 0) {
  const d = new Date();
  d.setDate(d.getDate() + off * 7);
  const day = d.getDay() || 7;
  const mon = new Date(d); mon.setDate(d.getDate() - day + 1);
  mon.setDate(mon.getDate() + di);
  return mon.toLocaleDateString('it-IT',{day:'numeric',month:'long',year:'numeric'});
}

// ─── State helpers ───────────────────────────────
function getWeekData(off = 0) {
  const k = getWeekKey(off);
  if (!state[k]) {
    state[k] = DAYS.map((n, i) => ({
      name: n, short: DAY_SHORT[i],
      meals: MEALS.map((l, mi) => ({ label: l, icon: MEAL_ICONS[mi], text: '', kcal: null, nota: '' }))
    }));
  }
  return state[k];
}
function getCurrentDay() { return getWeekData(weekOffset)[dayIndex]; }

// ─── Navigation ──────────────────────────────────
function changeDay(dir) {
  const newIdx = dayIndex + dir;
  if (newIdx < 0) {
    weekOffset--;
    dayIndex = 6;
    loadWeekIfNeeded(weekOffset).then(render);
  } else if (newIdx > 6) {
    weekOffset++;
    dayIndex = 0;
    loadWeekIfNeeded(weekOffset).then(render);
  } else {
    dayIndex = newIdx;
    render();
  }
}

// ─── Load / Save ─────────────────────────────────
async function loadWeekIfNeeded(off) {
  const k = getWeekKey(off);
  if (state[k]) return;
  showLoader('Carico settimana...');
  try {
    const r = await fetch(`${WORKER}/load?week=${k}`);
    const d = await r.json();
    if (d.days && d.days.length === 7) {
      state[k] = d.days.map((day, i) => ({
        name: DAYS[i], short: DAY_SHORT[i],
        meals: MEALS.map((l, mi) => {
          const m = day.meals?.[mi] || {};
          return { label: l, icon: MEAL_ICONS[mi], text: m.text || '', kcal: m.kcal ?? null, nota: m.nota || '' };
        })
      }));
    } else {
      state[k] = DAYS.map((n, i) => ({ name: n, short: DAY_SHORT[i], meals: MEALS.map((l, mi) => ({ label: l, icon: MEAL_ICONS[mi], text: '', kcal: null, nota: '' })) }));
    }
  } catch {
    state[k] = DAYS.map((n, i) => ({ name: n, short: DAY_SHORT[i], meals: MEALS.map((l, mi) => ({ label: l, icon: MEAL_ICONS[mi], text: '', kcal: null, nota: '' })) }));
    toast('Offline — dati locali', 'warn');
  }
  hideLoader();
}

async function saveDay() {
  const btn = document.getElementById('saveBtn');
  btn.disabled = true; btn.textContent = '...';
  const wk = getWeekKey(weekOffset);
  const days = getWeekData(weekOffset);
  try {
    const r = await fetch(`${WORKER}/save`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ weekKey: wk, days }),
    });
    const d = await r.json();
    if (d.error) throw new Error(d.error);
    toast(`✓ Salvato su Sheets`, 'ok');
  } catch(e) { toast('Errore: ' + e.message, 'err'); }
  btn.disabled = false; btn.textContent = 'Salva';
}

// ─── Render ──────────────────────────────────────
function render() {
  const day = getCurrentDay();
  // Header
  document.getElementById('dayName').textContent = day.name;
  document.getElementById('dayDate').textContent = getDayDate(dayIndex, weekOffset);
  // Meals
  const scroll = document.getElementById('scroll');
  scroll.innerHTML = '';
  day.meals.forEach((m, mi) => {
    const card = document.createElement('div');
    card.className = 'meal-card' + (m.kcal !== null ? ' has-kcal' : '');
    card.id = `mc-${mi}`;
    card.innerHTML = `
      <div class="meal-top">
        <div class="meal-left">
          <div class="meal-icon">${m.icon}</div>
          <div class="meal-name">${m.label}</div>
        </div>
        <div class="meal-kcal-pill ${m.kcal !== null ? 'show' : ''}" id="mkp-${mi}">${m.kcal !== null ? m.kcal + ' kcal' : ''}</div>
      </div>
      <div class="meal-input-row">
        <textarea class="meal-ta" id="mta-${mi}" rows="1" placeholder="${PH[mi]}"
          oninput="autoH(this);getCurrentDay().meals[${mi}].text=this.value"
        >${m.text}</textarea>
        <button class="calc-btn" id="cb-${mi}" onclick="calcMeal(${mi})">⚡</button>
      </div>
      <div class="meal-nota" id="mn-${mi}">${m.nota || ''}</div>`;
    scroll.appendChild(card);
  });
  setTimeout(() => document.querySelectorAll('.meal-ta').forEach(autoH), 20);
  updateDayUI();
}

function updateDayUI() {
  const day = getCurrentDay();
  const tg = getTarget();
  const tot = day.meals.reduce((s, m) => s + (m.kcal || 0), 0);
  const hasAny = day.meals.some(m => m.kcal !== null);
  const filled = day.meals.filter(m => m.text.trim()).length;

  const bigEl = document.getElementById('kcalBig');
  bigEl.textContent = hasAny ? tot.toLocaleString('it-IT') : '—';
  bigEl.className = 'kcal-big' + (!hasAny ? '' : tot > tg * 1.1 ? ' over' : tot >= tg * 0.85 ? ' ok' : ' warn');

  document.getElementById('statTarget').textContent = tg.toLocaleString('it-IT');
  document.getElementById('statMeals').textContent = `${filled}/5`;

  const bal = hasAny ? tot - tg : null;
  const balEl = document.getElementById('statBal');
  if (bal === null) { balEl.textContent = '—'; balEl.className = 'stat-val'; }
  else {
    balEl.textContent = (bal >= 0 ? '+' : '') + bal.toLocaleString('it-IT');
    balEl.className = 'stat-val' + (bal > tg * 0.1 ? ' over' : bal < -tg * 0.1 ? ' ok' : '');
  }

  const pct = hasAny ? Math.min(tot / tg * 100, 110) : 0;
  const fill = document.getElementById('progFill');
  fill.style.width = Math.min(pct, 100) + '%';
  fill.className = 'prog-fill' + (!hasAny ? ' empty' : pct > 100 ? ' over' : '');
}

function autoH(el) { el.style.height = 'auto'; el.style.height = el.scrollHeight + 'px'; }

// ─── Calc ────────────────────────────────────────
async function calcMeal(mi) {
  const meal = getCurrentDay().meals[mi];
  const text = meal.text.trim();
  if (!text) return;
  setLoad(mi, true);
  try {
    const r = await fetch(`${WORKER}/kcal`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text, meal: MEALS[mi], day: getCurrentDay().name }),
    });
    const d = await r.json();
    if (d.error) throw new Error(d.error);
    meal.kcal = d.kcal; meal.nota = d.nota || '';
    // Update UI
    const pill = document.getElementById(`mkp-${mi}`);
    const nota = document.getElementById(`mn-${mi}`);
    const card = document.getElementById(`mc-${mi}`);
    if (pill) { pill.textContent = d.kcal + ' kcal'; pill.classList.add('show'); }
    if (nota) nota.textContent = d.nota || '';
    if (card) card.classList.add('has-kcal');
    updateDayUI();
  } catch(e) { toast('Errore: ' + e.message, 'err'); }
  setLoad(mi, false);
}

async function calcAllDay() {
  const meals = getCurrentDay().meals;
  for (let mi = 0; mi < meals.length; mi++) {
    if (meals[mi].text.trim()) await calcMeal(mi);
  }
}

function setLoad(mi, on) {
  const btn = document.getElementById(`cb-${mi}`);
  if (!btn) return;
  btn.disabled = on;
  btn.innerHTML = on ? '<span class="spin">◌</span>' : '⚡';
  if (on) btn.style.background = 'var(--glass2)';
  else btn.style.background = '';
}

// ─── Report ──────────────────────────────────────
let reportWeekOffset = 0;

function openReport() {
  reportWeekOffset = weekOffset;
  renderReport();
  document.getElementById('report').classList.add('open');
}
function closeReport() { document.getElementById('report').classList.remove('open'); }

function renderReport() {
  const days = getWeekData(reportWeekOffset);
  const tg = getTarget();
  const wk = getWeekKey(reportWeekOffset);
  const scroll = document.getElementById('reportScroll');

  // Calcoli settimana
  const daysWithData = days.filter(d => d.meals.some(m => m.kcal !== null));
  const weekTot = days.reduce((s, d) => s + d.meals.reduce((ss, m) => ss + (m.kcal || 0), 0), 0);
  const weekAvg = daysWithData.length ? Math.round(weekTot / daysWithData.length) : null;
  const weekBal = daysWithData.length ? weekTot - tg * daysWithData.length : null;
  const daysOk = daysWithData.filter(d => { const t = d.meals.reduce((s,m)=>s+(m.kcal||0),0); return t>=tg*0.85&&t<=tg*1.1; }).length;

  const isCurrentWeek = reportWeekOffset === 0;
  const todayIdx = new Date().getDay() === 0 ? 6 : new Date().getDay() - 1;

  scroll.innerHTML = `
    <div class="week-nav-row">
      <button class="wn-btn" onclick="reportWeekOffset--;loadWeekIfNeeded(reportWeekOffset).then(renderReport)">‹</button>
      <div class="wn-info">
        <div class="wn-key">${wk}</div>
        <div class="wn-dates">${getWeekDates(reportWeekOffset)}</div>
      </div>
      <button class="wn-btn" onclick="reportWeekOffset++;loadWeekIfNeeded(reportWeekOffset).then(renderReport)">›</button>
    </div>

    <div class="week-summary">
      <div class="ws-title">Riepilogo settimana</div>
      <div class="ws-grid">
        <div class="ws-item">
          <div class="ws-val ${weekAvg ? (weekAvg>tg*1.1?'over':weekAvg>=tg*0.85?'ok':'warn') : ''}">${weekAvg ? weekAvg.toLocaleString('it-IT') : '—'}</div>
          <div class="ws-lbl">Media/giorno</div>
        </div>
        <div class="ws-item">
          <div class="ws-val">${daysWithData.length ? weekTot.toLocaleString('it-IT') : '—'}</div>
          <div class="ws-lbl">Totale kcal</div>
        </div>
        <div class="ws-item">
          <div class="ws-val ${daysOk===daysWithData.length&&daysWithData.length>0?'ok':daysOk>0?'warn':''}">${daysWithData.length ? daysOk+'/'+daysWithData.length : '—'}</div>
          <div class="ws-lbl">Nel target</div>
        </div>
      </div>
    </div>

    ${days.map((day, di) => {
      const dayTot = day.meals.reduce((s,m)=>s+(m.kcal||0),0);
      const hasData = day.meals.some(m=>m.kcal!==null);
      const mealsCount = day.meals.filter(m=>m.text.trim()).length;
      const status = !hasData ? '' : dayTot>tg*1.1?'over':dayTot>=tg*0.85?'ok':'partial';
      const isToday = isCurrentWeek && di === todayIdx;
      return `
        <div class="day-row ${isToday?'today':''}" onclick="closeReport();weekOffset=${reportWeekOffset};dayIndex=${di};render()">
          <div class="day-pill ${status}">
            <div class="dp-short ${status}">${day.short}</div>
            <div class="dp-num">${di+1}</div>
          </div>
          <div class="day-row-info">
            <div class="dr-name">${day.name}${isToday?' <span style="font-size:10px;color:var(--accent);font-family:var(--fb)">oggi</span>':''}</div>
            <div class="dr-meals">${mealsCount} pasti inseriti</div>
          </div>
          <div class="dr-kcal ${status}">${hasData ? dayTot.toLocaleString('it-IT')+' kcal' : '—'}</div>
        </div>`;
    }).join('')}
  `;
}

// ─── Toast / Loader ──────────────────────────────
let toastTimer;
function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'toast show' + (type ? ' ' + type : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}
function showLoader(t) { document.getElementById('loaderTxt').textContent = t; document.getElementById('loader').classList.add('show'); }
function hideLoader() { document.getElementById('loader').classList.remove('show'); }

// ─── Init ─────────────────────────────────────────
if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});
loadWeekIfNeeded(0).then(render);
</script>
</body>
